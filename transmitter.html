<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>導遊發送端 - 語音識別版</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .box { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        select, input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; }
        button { width: 90%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        #qrcode { margin: 20px auto; display: flex; justify-content: center; }
        #transcript { background: #333; color: #0f0; padding: 15px; border-radius: 8px; text-align: left; min-height: 50px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🎙️ 領隊發送系統</h2>
        <input type="text" id="customId" placeholder="輸入頻道名稱 (如: Tour888)">
        <input type="number" id="tourDays" value="10" placeholder="旅行團天數">
        
        <label>導遊說話的語言：</label>
        <select id="guideLang">
            <option value="zh-HK">廣東話 (Cantonese)</option>
            <option value="zh-CN">普通話 (Mandarin)</option>
            <option value="en-US">英語 (English)</option>
            <option value="ja-JP">日語 (Japanese)</option>
            <option value="ko-KR">韓語 (Korean)</option>
            <option value="fr-FR">法語 (French)</option>
            <option value="es-ES">西班牙語 (Spanish)</option>
            <option value="de-DE">德語 (German)</option>
            <option value="it-IT">意大利語 (Italian)</option>
            <option value="vi-VN">越南語 (Vietnamese)</option>
            <option value="tl-PH">菲律賓語 (Tagalog)</option>
        </select>
        
        <button id="setBtn">1. 生成 QR Code</button>
        <div id="qr-section" style="display:none;">
            <div id="qrcode"></div>
            <button id="startBtn" style="background:#007bff;">2. 開始直播講解</button>
        </div>
        <div id="transcript">等待說話...</div>
    </div>

    <script>
        let peer, localStream, connections = [];
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.continuous = true;
        recognition.interimResults = true;

        document.getElementById('setBtn').onclick = () => {
            const id = document.getElementById('customId').value.trim();
            if(!id) return alert("請輸入ID");
            peer = new Peer(id);
            peer.on('open', (openedId) => {
                document.getElementById('qr-section').style.display = 'block';
                const guestUrl = window.location.href.replace('transmitter.html', 'receiver.html') + `?room=${openedId}&days=${document.getElementById('tourDays').value}`;
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById("qrcode"), guestUrl);
            });
            peer.on('connection', conn => connections.push(conn));
            peer.on('call', call => call.answer(localStream));
        };

        document.getElementById('startBtn').onclick = async () => {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recognition.lang = document.getElementById('guideLang').value;
            recognition.start();
            document.getElementById('startBtn').innerText = "🔴 講解中...";
        };

        recognition.onresult = (event) => {
            let text = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                text += event.results[i][0].transcript;
            }
            document.getElementById('transcript').innerText = text;
            connections.forEach(conn => conn.send({ text: text, lang: recognition.lang }));
        };
        recognition.onend = () => recognition.start();
    </script>
</body>
</html>
