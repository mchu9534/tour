<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客人接收端 - 強化連線版</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #eef2f3; padding: 20px; }
        .box { max-width: 400px; margin: auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        /* 圓形按鈕 */
        .circle-btn { 
            width: 180px; height: 180px; border-radius: 50%; border: none; 
            background: linear-gradient(135deg, #28a745, #218838); color: white; 
            font-size: 22px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 10px 20px rgba(40,167,69,0.3); transition: 0.3s;
            margin: 30px auto; display: flex; align-items: center; justify-content: center;
        }
        .circle-btn:disabled { background: #6c757d; box-shadow: none; transform: scale(0.95); }
        .subtitle { background: #1a1a1a; color: #fff; padding: 20px; font-size: 24px; min-height: 120px; text-align: left; border-radius: 15px; margin-top: 20px; line-height: 1.5; }
        #status { font-size: 14px; margin-bottom: 10px; padding: 8px; border-radius: 8px; }
        .connected-status { background: #d4edda; color: #155724; }
        .waiting-status { background: #fff3cd; color: #856404; }
        select { width: 100%; padding: 12px; border-radius: 10px; font-size: 16px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="box">
        <h3>🎧 同步翻譯講解</h3>
        <div id="status" class="waiting-status">請點擊按鈕加入頻道</div>
        
        <label>選擇翻譯目標語言：</label>
        <select id="targetLang">
            <option value="zh-TW">廣東話 (繁體)</option>
            <option value="zh-CN">普通話 (簡體)</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
        </select>

        <button id="joinBtn" class="circle-btn">點擊開始<br>聽取講解</button>

        <div id="translatedText" class="subtitle">等待廣播文字...</div>
    </div>
    <audio id="remoteAudio" autoplay playsinline></audio>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        const days = urlParams.get('days') || 10;
        const audio = document.getElementById('remoteAudio');

        // 頻道記憶與有效期限
        if (roomId) {
            localStorage.setItem('saved_room', roomId);
            localStorage.setItem('saved_expiry', Date.now() + (days * 86400000));
        } else {
            const savedRoom = localStorage.getItem('saved_room');
            const expiry = localStorage.getItem('saved_expiry');
            if (savedRoom && Date.now() < expiry) {
                roomId = savedRoom;
                document.getElementById('status').innerText = "已恢復歷史頻道: " + roomId;
            }
        }

        const peer = new Peer();

        async function translateText(text, source, target) {
            if (source.split('-')[0] === target.split('-')[0]) return text;
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${source}|${target}`);
                const data = await res.json();
                return data.responseData.translatedText;
            } catch (e) { return text; }
        }

        document.getElementById('joinBtn').onclick = function() {
            if (!roomId) return alert("錯誤：無法識別頻道 ID。請重新掃描 QR Code。");
            
            this.innerText = "正在連線...";
            document.getElementById('status').innerText = "⏳ 正在搜尋導遊頻道...";
            
            // 點擊瞬間播放空聲音，解鎖手機限制
            audio.play().catch(()=>{});

            // 1. 建立語音呼叫
            const call = peer.call(roomId, new MediaStream());
            call.on('stream', stream => {
                audio.srcObject = stream;
                audio.play();
                document.getElementById('status').innerText = "✅ 語音連線成功";
                document.getElementById('status').className = "connected-status";
                this.innerText = "連線成功";
                this.disabled = true;
            });

            // 2. 建立文字數據連線
            const conn = peer.connect(roomId);
            conn.on('data', async (data) => {
                const target = document.getElementById('targetLang').value;
                const result = await translateText(data.text, data.lang, target);
                document.getElementById('translatedText').innerText = result;
            });

            conn.on('error', () => {
                document.getElementById('status').innerText = "❌ 無法連線，導遊可能未啟動直播";
                this.innerText = "重試連線";
            });
        };
    </script>
</body>
</html>
